language:"python"
python: "nightly"
install :
  - pip install mkdocs-material
script :
 - mkdocs build
deploy :
  - provider: pages
    repo: devlopermodoki/pages
    skip_cleanup: true
    github_token: $DEPROY
    keep_history: false
    local_dir: ./site
    target_branch: page
    on:
      branch: main
